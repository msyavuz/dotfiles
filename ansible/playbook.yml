---
# Bootstrap a Fedora machine from this dotfiles repo.
#
# Usage:
#   sudo dnf install -y ansible stow
#   ansible-playbook -K -i localhost, -c local ansible/playbook.yml
#
# -K asks for sudo password (needed for dnf tasks).

- name: Bootstrap Fedora workstation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    dotfiles_dir: "{{ ansible_env.HOME }}/Dotfiles"

    stow_packages:
      - autorandr
      - btop
      - direnv
      - dunst
      - gammastep
      - ghostty
      - git
      - gtk
      - i3status-rust
      - kitty
      - p10k
      - rofi
      - starship
      - sway
      - tmux
      - waybar
      - zathura
      - zsh

    dnf_packages:
      # WM & Wayland
      - sway
      - swaybg
      - swayidle
      - swaylock
      - waybar
      - grim
      - slurp
      - wl-clipboard
      - cliphist
      - rofi
      - dunst
      - gammastep
      - polkit-gnome
      - network-manager-applet
      - blueman
      - brightnessctl
      - pavucontrol
      - playerctl

      # Terminal & shell
      - zsh
      - tmux
      - stow

      # CLI tools
      - eza
      - lazygit
      - ripgrep
      - fd-find
      - jq
      - curl
      - zoxide
      - fzf
      - bat
      - btop
      - feh
      - flameshot
      - xclip
      - make
      - gcc
      - gcc-c++

      # Build deps for source-built apps
      # neovim master:
      - cmake
      - ninja-build
      - libtool
      - autoconf
      - automake
      - gettext
      - gettext-devel
      - pkgconfig
      - unzip
      - patch
      # ghostty (zig build):
      - zig
      - gtk4-devel
      - libadwaita-devel
      - bzip2-devel
      - minizip-devel
      - blueprint-compiler

      # Dev runtimes (node comes via nvm, not dnf)
      - python3
      - python3-pip
      - golang
      - rustup

      # Git
      - git
      - git-lfs

      # Fonts
      - dejavu-sans-fonts
      - dejavu-serif-fonts
      - dejavu-sans-mono-fonts
      - google-noto-fonts-common
      - google-noto-sans-fonts
      - jetbrains-mono-fonts
      - fontawesome-fonts

      # Misc
      - zathura
      - zathura-pdf-mupdf

    nvm_version: v0.40.1
    node_version: --lts

    npm_globals:
      - "@anthropic-ai/claude-code"
      - "@marp-team/marp-cli"
      - "@microsoft/compose-language-service"
      - "@nestjs/cli"
      - agor-live
      - demergi
      - firebase-tools
      - green-tunnel
      - lighthouse
      - netlify-cli
      - sql-language-server
      - tree-sitter-cli
      - vscode-langservers-extracted

    cargo_tools:
      - stylua

  tasks:
    - name: Install dnf packages
      become: true
      ansible.builtin.dnf:
        name: "{{ dnf_packages }}"
        state: present

    - name: Initialise rustup toolchain
      ansible.builtin.command: rustup default stable
      args:
        creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo"

    - name: Install cargo tools
      ansible.builtin.command: "cargo install {{ item }}"
      args:
        creates: "{{ ansible_env.HOME }}/.cargo/bin/{{ item }}"
      loop: "{{ cargo_tools }}"

    - name: Install nvm
      ansible.builtin.shell: >
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
      args:
        creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"

    - name: Install node via nvm
      ansible.builtin.shell: >
        . "$HOME/.nvm/nvm.sh" && nvm install {{ node_version }} && nvm alias default {{ node_version }}
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.nvm/alias/default"

    - name: Install npm globals under current nvm node
      ansible.builtin.shell: >
        . "$HOME/.nvm/nvm.sh" && nvm use default && npm install -g {{ item }}
      args:
        executable: /bin/bash
      register: npm_install
      changed_when: "'added' in npm_install.stdout or 'updated' in npm_install.stdout"
      loop: "{{ npm_globals }}"

    # --- Source builds --------------------------------------------------

    - name: Ensure source tree exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/Packages"
        state: directory

    # ghostty — Zig build into ~/.local
    - name: Clone ghostty
      ansible.builtin.git:
        repo: https://github.com/ghostty-org/ghostty.git
        dest: "{{ ansible_env.HOME }}/Packages/ghostty"
        version: main
    - name: Build + install ghostty
      ansible.builtin.command:
        cmd: zig build -Doptimize=ReleaseFast -p "{{ ansible_env.HOME }}/.local"
        chdir: "{{ ansible_env.HOME }}/Packages/ghostty"
        creates: "{{ ansible_env.HOME }}/.local/bin/ghostty"

    # neovim — master, make install to /usr/local
    - name: Clone neovim
      ansible.builtin.git:
        repo: https://github.com/neovim/neovim.git
        dest: "{{ ansible_env.HOME }}/Packages/neovim"
        version: master
    - name: Build neovim
      community.general.make:
        chdir: "{{ ansible_env.HOME }}/Packages/neovim"
        params:
          CMAKE_BUILD_TYPE: RelWithDebInfo
    - name: Install neovim
      community.general.make:
        chdir: "{{ ansible_env.HOME }}/Packages/neovim"
        target: install
      become: true

    # lazydocker — go install
    - name: Install lazydocker
      ansible.builtin.command:
        cmd: go install github.com/jesseduffield/lazydocker@latest
        creates: "{{ ansible_env.HOME }}/go/bin/lazydocker"
      environment:
        GOPATH: "{{ ansible_env.HOME }}/go"
        GOBIN: "{{ ansible_env.HOME }}/go/bin"

    # --- Dotfiles -------------------------------------------------------

    - name: Stow dotfile packages
      ansible.builtin.command: "stow -t {{ ansible_env.HOME }} -d {{ dotfiles_dir }} {{ item }}"
      register: stow_result
      changed_when: "'LINK' in stow_result.stderr or 'LINK' in stow_result.stdout"
      failed_when:
        - stow_result.rc != 0
        - "'existing target is neither a link nor a directory' not in stow_result.stderr"
      loop: "{{ stow_packages }}"

    - name: Set zsh as default shell
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh
